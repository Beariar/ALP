<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deck Shuffle Animation • Tarot Flip</title>
  <style>
    :root {
      --card-w: clamp(140px, 28vw, 400px);
      --card-h: calc(var(--card-w) * 1.5);
      --fan-angle: 90deg;
      --wood-bg: url('https://cdn.jsdelivr.net/gh/Beariar/ALP@main/WoodBackground.jpg');
      --modal-bg: url('https://cdn.jsdelivr.net/gh/Beariar/ALP@main/SpellDetailBackground3.jpg');
      --card-back: url('https://cdn.jsdelivr.net/gh/Beariar/ALP@main/Tarot/T3/_TarotCardBack.jpg');
      --accent: rgba(0, 183, 255, 0.82);
      --accent-soft: rgba(0, 183, 255, 0.18);
      --accent-solid: rgb(0, 183, 255);
      --gold: #e8c879;
      --ink: #1a1008;
      --paper: rgba(255, 246, 221, 0.9);
      --paper-strong: rgba(255, 248, 226, 0.97);
    }

    @media (min-width: 640px) {
      :root { --fan-angle: 110deg; }
    }

    @media (min-width: 1024px) {
      :root { --card-w: clamp(220px, 22vw, 400px); --fan-angle: 130deg; }
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      color: #fff;
      font-family: 'Lexend Giga', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% 12%, rgba(0, 183, 255, 0.12), transparent 32%),
        linear-gradient(rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.42)),
        #1e1e1e var(--wood-bg) center / cover no-repeat fixed;
    }

    body.modal-open {
      position: fixed;
      width: 100%;
      overflow: hidden;
      touch-action: none;
    }

    .toolbar {
      width: min(94vw, 1120px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 4px 0;
      position: relative;
      z-index: 2;
    }

    .toolbar-title {
      margin: 0;
      font-size: clamp(1.05rem, 3vw, 1.65rem);
      text-shadow: 0 3px 16px rgba(0, 0, 0, 0.8);
      letter-spacing: 0.04em;
    }

    .toolbar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .deck-note {
      border: 1px solid rgba(232, 200, 121, 0.45);
      background: rgba(0, 0, 0, 0.34);
      color: rgba(255, 248, 226, 0.92);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: clamp(0.72rem, 2vw, 0.85rem);
      backdrop-filter: blur(6px);
      box-shadow: inset 0 0 24px rgba(232, 200, 121, 0.08);
    }

    .shuffle-button,
    .dm-overview-button,
    .modal-close,
    .modal-draw-again {
      appearance: none;
      border: 1px solid rgba(232, 200, 121, 0.7);
      color: #fff8e2;
      background:
        linear-gradient(135deg, rgba(31, 17, 6, 0.94), rgba(7, 16, 92, 0.88)),
        rgba(0, 0, 0, 0.6);
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      font: inherit;
      font-size: 0.86rem;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35), inset 0 0 18px rgba(232, 200, 121, 0.08);
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease, filter 180ms ease;
    }

    .shuffle-button:hover,
    .dm-overview-button:hover,
    .modal-close:hover,
    .modal-draw-again:hover {
      transform: translateY(-1px);
      border-color: var(--accent-solid);
      box-shadow: 0 0 22px rgba(0, 183, 255, 0.22), 0 10px 28px rgba(0, 0, 0, 0.42);
      filter: brightness(1.08);
    }

    #deck {
      position: relative;
      width: 100%;
      max-width: 1200px;
      height: clamp(calc(var(--card-h) + 40px), 68vh, 760px);
      perspective: 1400px;
      padding-bottom: env(safe-area-inset-bottom);
      display: flex;
      justify-content: center;
      align-items: flex-end;
      isolation: isolate;
    }

    #deck::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: clamp(18px, 5vh, 70px);
      width: min(76vw, 780px);
      height: min(30vh, 210px);
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.54), rgba(0, 0, 0, 0) 68%);
      filter: blur(8px);
      z-index: -1;
      pointer-events: none;
    }

    .deck-disabled { pointer-events: none; }

    .card,
    .drawn-card {
      width: var(--card-w);
      height: var(--card-h);
      position: absolute;
      transform-origin: bottom center;
      transform: rotate(var(--angle, 0deg)) rotate(var(--orientation, 0deg));
      transition: transform 320ms ease, filter 320ms ease, left 560ms cubic-bezier(.2,.75,.16,1), top 560ms cubic-bezier(.2,.75,.16,1), opacity 250ms ease;
      cursor: pointer;
      will-change: transform, left, top, opacity;
      touch-action: manipulation;
      perspective: 1200px;
      border-radius: 15px;
      filter: drop-shadow(0 12px 15px rgba(0, 0, 0, 0.55));
      appearance: none;
      -webkit-appearance: none;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      color: inherit;
      font: inherit;
    }

    .card.reversed,
    .drawn-card.reversed { --orientation: 180deg; }

    .card.shuffling { --orientation: 0deg; }

    .card-inner {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      transform-style: preserve-3d;
      transition: transform 780ms cubic-bezier(.2,.72,.19,1.03);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      backface-visibility: hidden;
      overflow: hidden;
      border: 2px solid rgba(0, 0, 0, 0.9);
      box-shadow: inset 0 0 0 1px rgba(255, 246, 221, 0.14), inset 0 0 26px rgba(0, 0, 0, 0.45);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .card-back {
      background-image:
        linear-gradient(145deg, rgba(255, 255, 255, 0.05), transparent 34%, rgba(0, 0, 0, 0.18)),
        var(--card-back);
    }

    .card-front {
      transform: rotateY(180deg);
      background-image: var(--front-image);
      background-color: #111;
    }

    .card-front::after,
    .card-back::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, rgba(255, 255, 255, 0.16), transparent 28%, transparent 62%, rgba(255, 255, 255, 0.08));
      opacity: 0.42;
      pointer-events: none;
    }

    .card.is-flipped .card-inner,
    .drawn-card.is-flipped .card-inner { transform: rotateY(180deg); }

    @media (hover: hover) and (pointer: fine) {
      .card:hover {
        transform: rotate(var(--angle, 0deg)) rotate(var(--orientation, 0deg)) scale(1.045) translateY(-8px);
        filter: drop-shadow(0 0 18px rgba(0, 183, 255, 0.95)) drop-shadow(0 20px 26px rgba(0, 0, 0, 0.55));
      }

      .card:hover .card-face {
        border-color: var(--accent-solid);
        box-shadow: 0 0 0 2px rgba(0, 183, 255, 0.34), inset 0 0 28px rgba(0, 0, 0, 0.48);
      }
    }

    .card.shuffling {
      animation: deckShuffle 920ms cubic-bezier(.26,.84,.24,1) both;
      animation-delay: var(--shuffle-delay, 0ms);
    }

    @keyframes deckShuffle {
      0% {
        transform: rotate(var(--stack-angle, 0deg)) translate3d(0, 0, 0);
        filter: drop-shadow(0 12px 15px rgba(0, 0, 0, 0.55));
      }
      18% {
        transform: rotate(var(--stack-angle, 0deg)) translate3d(var(--shuffle-x, 18px), -16px, 0) rotateZ(var(--shuffle-r, 8deg));
      }
      38% {
        transform: rotate(var(--stack-angle, 0deg)) translate3d(calc(var(--shuffle-x, 18px) * -0.72), 8px, 0) rotateZ(calc(var(--shuffle-r, 8deg) * -1.05));
      }
      62% {
        transform: rotate(var(--stack-angle, 0deg)) translate3d(calc(var(--shuffle-x, 18px) * 0.48), -10px, 0) rotateZ(calc(var(--shuffle-r, 8deg) * 0.62));
      }
      82% {
        transform: rotate(var(--stack-angle, 0deg)) translate3d(calc(var(--shuffle-x, 18px) * -0.2), 4px, 0) rotateZ(calc(var(--shuffle-r, 8deg) * -0.22));
      }
      100% {
        transform: rotate(var(--stack-angle, 0deg)) translate3d(0, 0, 0);
        filter: drop-shadow(0 12px 15px rgba(0, 0, 0, 0.55));
      }
    }

    .draw-stage {
      position: fixed;
      inset: 0;
      z-index: 9000;
      pointer-events: none;
      background: radial-gradient(circle at 50% 50%, rgba(0, 183, 255, 0.16), rgba(0, 0, 0, 0.1) 34%, rgba(0, 0, 0, 0.58));
      opacity: 0;
      transition: opacity 300ms ease;
    }

    .draw-stage.active { opacity: 1; }

    .drawn-card {
      position: fixed;
      left: var(--start-left);
      top: var(--start-top);
      width: var(--start-width);
      height: var(--start-height);
      transform-origin: center center;
      transform: translate(0, 0) rotate(0deg);
      z-index: 1;
      cursor: default;
      transition: left 720ms cubic-bezier(.18,.78,.18,1), top 720ms cubic-bezier(.18,.78,.18,1), width 720ms cubic-bezier(.18,.78,.18,1), height 720ms cubic-bezier(.18,.78,.18,1), transform 720ms cubic-bezier(.18,.78,.18,1), filter 720ms ease;
    }

    .drawn-card.centered {
      left: 50%;
      top: 50%;
      width: min(64vw, 360px);
      height: min(96vw, 540px);
      transform: translate(-50%, -50%) rotate(var(--draw-rotation, 0deg));
      filter: drop-shadow(0 0 26px rgba(0, 183, 255, 0.8)) drop-shadow(0 22px 42px rgba(0, 0, 0, 0.72));
    }

    .drawn-card.reversed.centered { --draw-rotation: 180deg; }

    .draw-stage::before,
    .draw-stage::after {
      content: "✦";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: rgba(232, 200, 121, 0.7);
      font-size: min(18vw, 96px);
      opacity: 0;
      animation: sparklePulse 1300ms ease both;
    }

    .draw-stage::after {
      content: "☾";
      color: rgba(0, 183, 255, 0.58);
      font-size: min(23vw, 130px);
      animation-delay: 240ms;
    }

    @keyframes sparklePulse {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.6) rotate(0deg); }
      40% { opacity: 0.72; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.7) rotate(35deg); }
    }

    .modal {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background:
        linear-gradient(rgba(0, 0, 0, 0.58), rgba(0, 0, 0, 0.78)),
        var(--wood-bg) center / cover no-repeat;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      z-index: 9999;
      padding: clamp(12px, 3vw, 28px);
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      animation: modalFade 260ms ease both;
    }

    @keyframes modalFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      position: relative;
      background:
        radial-gradient(circle at 16% 12%, rgba(232, 200, 121, 0.2), transparent 28%),
        radial-gradient(circle at 86% 18%, rgba(0, 183, 255, 0.18), transparent 34%),
        var(--modal-bg) center / cover no-repeat,
        #2a2a2a;
      border-radius: 22px;
      border: 1px solid rgba(232, 200, 121, 0.44);
      padding: clamp(14px, 2.6vw, 28px);
      width: min(96vw, 1120px);
      margin: auto 0;
      overflow: visible;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.72), inset 0 0 0 1px rgba(255, 248, 226, 0.18);
    }

    .modal-content::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 16px;
      border: 1px solid rgba(255, 248, 226, 0.17);
      pointer-events: none;
    }

    .modal-header {
      position: sticky;
      top: -1px;
      z-index: 4;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.35rem;
      padding: 0 0 0.35rem;
      backdrop-filter: blur(4px);
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .modal-close,
    .modal-draw-again {
      color: #fff8e2;
      flex: 0 0 auto;
    }

    .modal-body { color: var(--ink); }

    .reading-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: clamp(16px, 4vw, 34px);
      align-items: stretch;
    }

    @media (min-width: 900px) {
      .reading-layout { grid-template-columns: minmax(260px, 38%) 1fr; }
    }

    .revealed-card-frame {
      position: relative;
      align-self: start;
      padding: clamp(12px, 2vw, 18px);
      border-radius: 24px;
      background:
        linear-gradient(145deg, rgba(26, 16, 8, 0.76), rgba(2, 9, 38, 0.72)),
        rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(232, 200, 121, 0.55);
      box-shadow: 0 20px 55px rgba(0, 0, 0, 0.44), inset 0 0 32px rgba(232, 200, 121, 0.08);
    }

    .revealed-card-frame img {
      width: min(100%, 430px);
      max-height: 72vh;
      object-fit: contain;
      border-radius: 14px;
      border: 2px solid rgba(232, 200, 121, 0.7);
      box-shadow: 0 0 28px rgba(0, 183, 255, 0.35), 0 18px 40px rgba(0, 0, 0, 0.42);
      display: block;
      margin-inline: auto;
      background: rgba(0, 0, 0, 0.45);
    }

    .revealed-card-frame.reversed img { transform: rotate(180deg); }

    .orientation-seal {
      position: absolute;
      left: 50%;
      bottom: 4px;
      transform: translate(-50%, 50%);
      color: #fff8e2;
      background:
        linear-gradient(135deg, rgba(26, 16, 8, 0.96), rgba(7, 16, 92, 0.92));
      border: 1px solid rgba(232, 200, 121, 0.78);
      border-radius: 999px;
      padding: 9px 16px;
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.42);
      white-space: nowrap;
    }

    .reading-panel {
      border-radius: 24px;
      padding: clamp(16px, 3vw, 28px);
      background:
        linear-gradient(135deg, rgba(255, 248, 226, 0.94), rgba(244, 224, 170, 0.84)),
        rgba(255, 248, 226, 0.9);
      border: 1px solid rgba(94, 55, 16, 0.28);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.32), 0 20px 55px rgba(0, 0, 0, 0.28);
    }

    .reading-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(26, 16, 8, 0.72);
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border: 1px solid rgba(94, 55, 16, 0.18);
      background: rgba(255, 255, 255, 0.26);
      border-radius: 999px;
      padding: 7px 11px;
      margin-bottom: 0.8rem;
    }

    .reading-panel h2 {
      margin: 0;
      font-size: clamp(1.55rem, 3.6vw, 3rem);
      line-height: 1.02;
      color: var(--ink);
    }

    .omen-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin: 1rem 0;
    }

    .omen-chip {
      border-radius: 16px;
      padding: 12px;
      background: rgba(26, 16, 8, 0.08);
      border: 1px solid rgba(26, 16, 8, 0.12);
    }

    .omen-chip span {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(26, 16, 8, 0.56);
      margin-bottom: 4px;
    }

    .omen-chip strong {
      display: block;
      font-size: 0.98rem;
      color: var(--ink);
    }


    .effect-card {
      position: relative;
      overflow: hidden;
      margin-top: 1rem;
      border-radius: 18px;
      padding: clamp(14px, 2.4vw, 22px);
      background:
        radial-gradient(circle at top right, rgba(0, 183, 255, 0.18), transparent 32%),
        rgba(255, 255, 255, 0.38);
      border: 1px solid rgba(26, 16, 8, 0.13);
      box-shadow: inset 0 0 32px rgba(255, 255, 255, 0.22);
    }

    .effect-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 5px;
      height: 100%;
      background: linear-gradient(var(--gold), var(--accent-solid));
      opacity: 0.85;
    }

    .effect-card h3 {
      margin: 0 0 0.75rem;
      font-size: clamp(1.05rem, 2.4vw, 1.35rem);
      color: var(--ink);
    }

    .effect-text {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: clamp(1.02rem, 2.2vw, 1.16rem);
      line-height: 1.68;
      color: rgba(26, 16, 8, 0.88);
    }

    .effect-text p:first-child { margin-top: 0; }
    .effect-text p:last-child { margin-bottom: 0; }
    .effect-text ul,
    .effect-text ol { padding-left: 1.25rem; }
    .effect-text li { margin: 0.35rem 0; }


    .dm-overview-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .dm-overview-intro {
      margin: 0;
      color: rgba(26, 16, 8, 0.72);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      line-height: 1.55;
    }

    .dm-overview-controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin: 0.5rem 0 0;
    }

    @media (min-width: 720px) {
      .dm-overview-controls { grid-template-columns: minmax(240px, 1fr) 220px; }
    }

    .dm-overview-controls input,
    .dm-overview-controls select {
      width: 100%;
      border: 1px solid rgba(94, 55, 16, 0.32);
      border-radius: 999px;
      padding: 12px 14px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.52);
      font: 600 0.95rem system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.2);
      outline: none;
    }

    .dm-overview-controls input:focus,
    .dm-overview-controls select:focus {
      border-color: rgba(0, 183, 255, 0.78);
      box-shadow: 0 0 0 3px rgba(0, 183, 255, 0.16), inset 0 0 18px rgba(255, 255, 255, 0.2);
    }

    .dm-overview-count {
      color: rgba(26, 16, 8, 0.58);
      font: 700 0.78rem system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .dm-overview-list {
      display: grid;
      gap: 12px;
    }

    .dm-card-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.36);
      border: 1px solid rgba(26, 16, 8, 0.13);
      box-shadow: inset 0 0 24px rgba(255, 255, 255, 0.16);
    }

    @media (min-width: 900px) {
      .dm-card-row { grid-template-columns: minmax(210px, 0.62fr) 1fr 1fr; }
    }

    .dm-card-name {
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 12px;
      align-items: center;
      border-radius: 14px;
      padding: 12px;
      background: rgba(26, 16, 8, 0.08);
      border: 1px solid rgba(26, 16, 8, 0.1);
    }

    @media (max-width: 420px) {
      .dm-card-name { grid-template-columns: 64px 1fr; }
      .dm-card-thumb { width: 64px; height: 96px; }
    }

    .dm-card-thumb {
      width: 82px;
      height: 123px;
      max-width: 100%;
      object-fit: contain;
      object-position: center;
      border-radius: 9px;
      border: 1px solid rgba(232, 200, 121, 0.68);
      background: rgba(0, 0, 0, 0.38);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
      display: block;
    }

    .dm-card-title { min-width: 0; }

    .dm-card-name strong {
      display: block;
      font-size: 1.02rem;
      color: var(--ink);
      line-height: 1.25;
    }

    .dm-card-name span {
      display: block;
      margin-top: 5px;
      color: rgba(26, 16, 8, 0.58);
      font: 700 0.72rem system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .dm-effect-column {
      min-width: 0;
      border-radius: 14px;
      padding: 12px;
      background: rgba(255, 248, 226, 0.44);
      border: 1px solid rgba(26, 16, 8, 0.1);
    }

    .dm-effect-column h3 {
      margin: 0 0 0.55rem;
      color: rgba(26, 16, 8, 0.7);
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .dm-effect-column .effect-text {
      font-size: 0.98rem;
      line-height: 1.55;
    }

    .dm-overview-empty {
      padding: 18px;
      text-align: center;
      border-radius: 16px;
      color: rgba(26, 16, 8, 0.68);
      background: rgba(255, 255, 255, 0.32);
      border: 1px solid rgba(26, 16, 8, 0.1);
    }


    .loading,
    .error-message {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(90vw, 640px);
      text-align: center;
      padding: 24px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(232, 200, 121, 0.45);
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
    }

    .error-message { color: #ffe0e0; }

    @media (max-width: 560px) {
      .toolbar { align-items: stretch; flex-direction: column; }
      .toolbar-actions { justify-content: space-between; }
      .deck-note { flex: 1; text-align: center; }
      .shuffle-button, .dm-overview-button { flex: 1; }
      .modal-header { justify-content: stretch; }
      .modal-actions { width: 100%; }
      .modal-close, .modal-draw-again { flex: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .card,
      .drawn-card,
      .card-inner,
      .modal,
      .draw-stage,
      .shuffle-button,
      .dm-overview-button,
      .modal-close,
      .modal-draw-again { transition: none !important; animation: none !important; }
    }
  </style>
</head>

<body>
  <header class="toolbar" aria-label="Tarot controls">
    <h1 class="toolbar-title">Tarot Deck</h1>
    <div class="toolbar-actions">
      <div class="deck-note" id="deck-note">Shuffle the deck, then draw a card.</div>
      <button class="dm-overview-button" type="button" id="dm-overview-button">DM Overview</button>
      <button class="shuffle-button" type="button" id="shuffle-button">Shuffle deck</button>
    </div>
  </header>

  <div id="deck" aria-label="Tarot deck"></div>

  <script>
    const JSON_URL = 'https://raw.githubusercontent.com/Beariar/ALP/refs/heads/main/Tarot/T3/TarotDetails.json';
    const IMAGE_BASE_URL = 'https://cdn.jsdelivr.net/gh/Beariar/ALP@main/Tarot/T3/';
    const REVERSED_RATIO = 0.35;

    let modalOpen = false;
    let currentDeck = [];
    let allCards = [];
    let isBusy = false;
    let scrollLockDepth = 0;
    let savedScrollY = 0;

    const deckEl = document.getElementById('deck');
    const shuffleButton = document.getElementById('shuffle-button');
    const dmOverviewButton = document.getElementById('dm-overview-button');
    const deckNote = document.getElementById('deck-note');

    function lockPageScroll() {
      if (scrollLockDepth === 0) {
        savedScrollY = window.scrollY || document.documentElement.scrollTop || 0;
        document.body.style.top = `-${savedScrollY}px`;
        document.body.classList.add('modal-open');
      }
      scrollLockDepth += 1;
    }

    function unlockPageScroll() {
      scrollLockDepth = Math.max(0, scrollLockDepth - 1);
      if (scrollLockDepth === 0) {
        document.body.classList.remove('modal-open');
        document.body.style.top = '';
        window.scrollTo(0, savedScrollY);
      }
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function safeRichText(value) {
      const raw = String(value ?? '').trim();
      if (!raw) return '<p>No effect text found for this card.</p>';

      const template = document.createElement('template');
      template.innerHTML = raw;
      const allowedTags = new Set(['BR', 'B', 'STRONG', 'I', 'EM', 'U', 'UL', 'OL', 'LI', 'P', 'DIV', 'SPAN']);
      const walker = document.createTreeWalker(template.content, NodeFilter.SHOW_ELEMENT, null);
      const elements = [];

      while (walker.nextNode()) elements.push(walker.currentNode);

      for (const el of elements) {
        if (!allowedTags.has(el.tagName)) {
          el.replaceWith(document.createTextNode(el.textContent || ''));
          continue;
        }
        for (const attr of [...el.attributes]) el.removeAttribute(attr.name);
      }

      const html = template.innerHTML.trim();
      const hasHtmlTags = /<\/?[a-z][\s\S]*>/i.test(raw);
      if (hasHtmlTags && html) return html.replace(/\n/g, '<br>');

      const paragraphs = escapeHtml(raw)
        .split(/\n{2,}/)
        .map(part => part.trim())
        .filter(Boolean)
        .map(part => `<p>${part.replace(/\n/g, '<br>')}</p>`)
        .join('');

      return paragraphs || '<p>No effect text found for this card.</p>';
    }


    async function loadDeck() {
      const res = await fetch(JSON_URL, { cache: 'no-cache' });
      if (!res.ok) throw new Error(`Could not load tarot details (${res.status})`);
      const data = await res.json();
      allCards = Array.isArray(data) ? data : [];
      return assignOrientations(shuffle([...allCards]));
    }

    function assignOrientations(cards) {
      return cards.map(card => ({
        ...card,
        _isReversed: Math.random() < REVERSED_RATIO
      }));
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function clearDeck() {
      deckEl.innerHTML = '';
    }

    function getCardSize() {
      const root = getComputedStyle(document.documentElement);
      const w = parseFloat(root.getPropertyValue('--card-w'));
      const h = parseFloat(root.getPropertyValue('--card-h')) || w * 1.5;
      return { w, h };
    }

    function getImageSrc(cardData) {
      return `${IMAGE_BASE_URL}${encodeURIComponent(cardData.Card)}.jpg`;
    }

    function createCardElement(card, angleDeg, isReversed) {
      const div = document.createElement('button');
      div.type = 'button';
      div.className = 'card';
      if (isReversed) div.classList.add('reversed');
      div.style.setProperty('--front-image', `url("${getImageSrc(card)}")`);
      div.setAttribute('aria-label', `${card.Card || 'Tarot card'} - ${isReversed ? 'reversed' : 'upright'}`);
      div.innerHTML = `
        <span class="card-inner" aria-hidden="true">
          <span class="card-face card-back"></span>
          <span class="card-face card-front"></span>
        </span>`;
      div.dataset.angle = String(angleDeg);
      return div;
    }

    function renderDeck(deck, animate = true) {
      clearDeck();
      deckEl.classList.remove('deck-disabled');
      const total = deck.length;

      if (!total) {
        deckEl.innerHTML = '<div class="error-message">No cards found in the tarot data.</div>';
        return;
      }

      const wide = window.innerWidth >= 1024;
      const fanAngle = wide ? 130 : (window.innerWidth >= 640 ? 110 : 90);
      // Original spread style: the whole fan starts from a random rotation,
      // so upright/reversed status is not obvious from the card backs.
      const baseAngle = Math.floor(Math.random() * 361);

      const originX = deckEl.clientWidth / 2;
      const originY = deckEl.clientHeight;
      const { w: cardW, h: cardH } = getCardSize();
      const targets = [];

      deck.forEach((card, index) => {
        const isReversed = Boolean(card._isReversed);
        const angleDeg = baseAngle + (fanAngle / Math.max(1, (total - 1))) * index;
        const div = createCardElement(card, angleDeg, isReversed);
        const targetLeft = `${originX - (cardW / 2)}px`;
        const targetTop = `${originY - cardH}px`;

        div.style.left = targetLeft;
        div.style.top = targetTop;
        const stackAngle = Math.round((Math.random() * 16) - 8);
        div.style.zIndex = String(index + 1);
        div.style.opacity = animate ? '0.98' : '1';
        div.style.setProperty('--angle', animate ? `${stackAngle}deg` : `${angleDeg}deg`);
        div.style.setProperty('--stack-angle', `${stackAngle}deg`);
        div.style.setProperty('--shuffle-x', `${Math.round((Math.random() * 64) - 32)}px`);
        div.style.setProperty('--shuffle-r', `${Math.round((Math.random() * 28) - 14)}deg`);
        div.style.setProperty('--shuffle-delay', `${Math.min(index, 20) * 14}ms`);

        targets.push({ el: div, angleDeg, card, isReversed });
        div.addEventListener('click', () => {
          if (!modalOpen && !isBusy) drawCard(card, isReversed, div);
        }, { passive: true });
        deckEl.appendChild(div);
      });

      if (animate) {
        playShuffle(targets);
      } else {
        deckNote.textContent = 'Choose a card from the fan.';
      }
    }

    function playShuffle(items) {
      isBusy = true;
      deckEl.classList.add('deck-disabled');
      deckNote.textContent = 'Shuffling the deck...';

      items.forEach(t => t.el.classList.add('shuffling'));

      // After a brief stacked-deck shuffle, restore the original spread/fan behavior.
      window.setTimeout(() => {
        items.forEach(t => {
          t.el.classList.remove('shuffling');
          t.el.style.transition = 'transform 520ms ease, filter 320ms ease, opacity 260ms ease';
          requestAnimationFrame(() => {
            t.el.style.setProperty('--angle', `${t.angleDeg}deg`);
            t.el.style.opacity = '1';
          });
        });
      }, 980);

      window.setTimeout(() => {
        deckEl.classList.remove('deck-disabled');
        deckNote.textContent = 'Choose a card from the fan.';
        isBusy = false;
      }, 1540);
    }

    function openModal(bodyHtml, ariaLabel = 'Card detail', options = {}) {
      if (modalOpen) return null;
      const showDrawAgain = options.showDrawAgain !== false;
      modalOpen = true;
      lockPageScroll();
      deckEl.classList.add('deck-disabled');

      const modal = document.createElement('div');
      modal.className = 'modal';
      modal.innerHTML = `
        <div class="modal-content" role="dialog" aria-modal="true" aria-label="${escapeHtml(ariaLabel)}">
          <div class="modal-header">
            <div class="modal-actions">
              ${showDrawAgain ? '<button class="modal-draw-again" type="button">Draw again</button>' : ''}
              <button class="modal-close" type="button" aria-label="Close">Close</button>
            </div>
          </div>
          <div class="modal-body">${bodyHtml}</div>
        </div>`;

      document.body.appendChild(modal);

      function escapeHandler(event) {
        if (event.key === 'Escape' && modalOpen) closeOnly();
      }

      const finishClose = () => {
        document.removeEventListener('keydown', escapeHandler);
        modal.remove();
        modalOpen = false;
        unlockPageScroll();
        deckEl.classList.remove('deck-disabled');
        deckNote.textContent = 'Choose a card from the fan.';
      };

      const closeOnly = () => {
        if (!modalOpen) return;
        finishClose();
      };

      const drawAgain = async () => {
        if (!modalOpen) return;
        finishClose();
        await reshuffleDeck(true);
      };

      modal.querySelector('.modal-close').addEventListener('click', closeOnly);
      const drawAgainButton = modal.querySelector('.modal-draw-again');
      if (drawAgainButton) drawAgainButton.addEventListener('click', drawAgain);
      modal.addEventListener('click', event => {
        if (event.target === modal) closeOnly();
      });
      document.addEventListener('keydown', escapeHandler);
      return modal;
    }


    function getDmOverviewCards() {
      const source = allCards.length ? allCards : currentDeck;
      return source.map(card => ({ ...card }));
    }

    function sortCardsForOverview(cards, sortMode) {
      return [...cards].sort((a, b) => {
        const nameA = String(a.Card || '').trim();
        const nameB = String(b.Card || '').trim();
        const result = nameA.localeCompare(nameB, undefined, { sensitivity: 'base', numeric: true });
        return sortMode === 'za' ? -result : result;
      });
    }

    function renderDmOverviewList(container, countEl, cards, filterValue, sortMode) {
      const needle = String(filterValue || '').trim().toLowerCase();
      const filtered = sortCardsForOverview(cards, sortMode)
        .filter(card => String(card.Card || '').toLowerCase().includes(needle));

      countEl.textContent = `${filtered.length} / ${cards.length} cards shown`;

      if (!filtered.length) {
        container.innerHTML = '<div class="dm-overview-empty">No cards match this filter.</div>';
        return;
      }

      container.innerHTML = filtered.map(card => {
        const cardName = card.Card || 'Unknown Card';
        const character = card.Character || 'Unknown character';
        const upright = card['Upright Effect'] ?? card.Effect ?? '';
        const reverse = card['Reverse Effect'] ?? '';

        return `
          <article class="dm-card-row">
            <div class="dm-card-name">
              <img class="dm-card-thumb" src="${getImageSrc(card)}" alt="${escapeHtml(cardName)}" loading="lazy">
              <div class="dm-card-title">
                <strong>${escapeHtml(cardName)}</strong>
                <span>${escapeHtml(character)}</span>
              </div>
            </div>
            <section class="dm-effect-column">
              <h3>Normal Effect</h3>
              <div class="effect-text">${safeRichText(upright)}</div>
            </section>
            <section class="dm-effect-column">
              <h3>Reverse Effect</h3>
              <div class="effect-text">${safeRichText(reverse)}</div>
            </section>
          </article>`;
      }).join('');
    }

    async function openDmOverview() {
      if (modalOpen) return;

      if (!allCards.length && !isBusy) {
        try {
          currentDeck = await loadDeck();
        } catch (error) {
          openModal(`<div class="error-message">${escapeHtml(error.message || 'Could not load the tarot deck.')}</div>`, 'DM Overview', { showDrawAgain: false });
          return;
        }
      }

      const cards = getDmOverviewCards();
      const body = `
        <section class="reading-panel dm-overview-panel">
          <div class="reading-eyebrow">✦ DM tools ✦</div>
          <h2>DM Overview</h2>
          <p class="dm-overview-intro">All tarot cards in one reference list, with normal and reverse effects side by side.</p>
          <div class="dm-overview-controls" aria-label="DM overview controls">
            <input id="dm-card-filter" type="search" placeholder="Filter by card name..." autocomplete="off">
            <select id="dm-card-sort" aria-label="Sort cards by name">
              <option value="az">Sort by name A → Z</option>
              <option value="za">Sort by name Z → A</option>
            </select>
          </div>
          <div class="dm-overview-count" id="dm-overview-count"></div>
          <div class="dm-overview-list" id="dm-overview-list"></div>
        </section>`;

      const modal = openModal(body, 'DM Overview', { showDrawAgain: false });
      if (!modal) return;

      const filterInput = modal.querySelector('#dm-card-filter');
      const sortSelect = modal.querySelector('#dm-card-sort');
      const list = modal.querySelector('#dm-overview-list');
      const count = modal.querySelector('#dm-overview-count');

      const refresh = () => renderDmOverviewList(list, count, cards, filterInput.value, sortSelect.value);
      filterInput.addEventListener('input', refresh);
      sortSelect.addEventListener('change', refresh);
      refresh();
      filterInput.focus({ preventScroll: true });
    }


    function drawCard(cardData, isReversed, sourceEl) {
      if (modalOpen || isBusy) return;
      isBusy = true;
      lockPageScroll();
      deckEl.classList.add('deck-disabled');
      deckNote.textContent = isReversed ? 'A reversed card turns...' : 'An upright card turns...';

      const imageSrc = getImageSrc(cardData);
      const rect = sourceEl.getBoundingClientRect();
      const stage = document.createElement('div');
      const hero = document.createElement('div');
      const ratio = rect.height / Math.max(1, rect.width);

      stage.className = 'draw-stage';
      hero.className = `drawn-card${isReversed ? ' reversed' : ''}`;
      hero.style.setProperty('--start-left', `${rect.left}px`);
      hero.style.setProperty('--start-top', `${rect.top}px`);
      hero.style.setProperty('--start-width', `${rect.width}px`);
      hero.style.setProperty('--start-height', `${rect.width * ratio}px`);
      hero.style.setProperty('--front-image', `url("${imageSrc}")`);
      hero.innerHTML = `
        <span class="card-inner" aria-hidden="true">
          <span class="card-face card-back"></span>
          <span class="card-face card-front"></span>
        </span>`;

      sourceEl.style.opacity = '0';
      stage.appendChild(hero);
      document.body.appendChild(stage);

      requestAnimationFrame(() => {
        stage.classList.add('active');
        hero.classList.add('centered');
      });

      window.setTimeout(() => {
        hero.classList.add('is-flipped');
      }, 760);

      window.setTimeout(() => {
        stage.remove();
        sourceEl.style.opacity = '1';
        isBusy = false;
        openCardDetails(cardData, isReversed);
        unlockPageScroll();
      }, 1620);
    }

    function openCardDetails(cardData, isReversed) {
      const imageSrc = getImageSrc(cardData);
      const orientationLabel = isReversed ? 'Reversed' : 'Upright';
      const effectKey = isReversed ? 'Reverse Effect' : 'Upright Effect';
      const effect = cardData[effectKey] ?? cardData.Effect ?? '';
      const cardName = cardData.Card || 'Unknown Card';
      const character = cardData.Character || 'Unknown character';

      const body = `
        <div class="reading-layout">
          <aside class="revealed-card-frame${isReversed ? ' reversed' : ''}">
            <img src="${imageSrc}" alt="${escapeHtml(cardName)}">
            <div class="orientation-seal">${orientationLabel}</div>
          </aside>
          <section class="reading-panel">
            <div class="reading-eyebrow">✦ Drawn card ✦</div>
            <h2>${escapeHtml(cardName)}</h2>
            <div class="omen-grid" aria-label="Card summary">
              <div class="omen-chip"><span>Orientation</span><strong>${orientationLabel}</strong></div>
              <div class="omen-chip"><span>Character</span><strong>${escapeHtml(character)}</strong></div>
            </div>
            <article class="effect-card">
              <h3>${escapeHtml(effectKey)}</h3>
              <div class="effect-text">${safeRichText(effect)}</div>
            </article>
          </section>
        </div>`;

      openModal(body, `${cardName} tarot reading`);
    }

    async function reshuffleDeck(animate = true) {
      if (isBusy) return;
      isBusy = true;
      deckEl.classList.add('deck-disabled');
      deckNote.textContent = 'Preparing the deck...';
      clearDeck();
      deckEl.innerHTML = '<div class="loading">The cards are gathering...</div>';

      try {
        currentDeck = await loadDeck();
        clearDeck();
        renderDeck(currentDeck, animate);
        if (!animate) isBusy = false;
      } catch (error) {
        clearDeck();
        deckEl.innerHTML = `<div class="error-message">${escapeHtml(error.message || 'Could not load the tarot deck.')}</div>`;
        deckNote.textContent = 'Deck could not be loaded.';
        isBusy = false;
      }
    }

    shuffleButton.addEventListener('click', () => {
      if (!modalOpen && !isBusy) reshuffleDeck(true);
    });

    dmOverviewButton.addEventListener('click', () => {
      if (!modalOpen) openDmOverview();
    });

    (async function init() {
      await reshuffleDeck(true);
    })();

    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        if (!modalOpen && !isBusy && currentDeck.length) renderDeck(currentDeck, false);
      }, 140);
    });
  </script>
</body>

</html>
