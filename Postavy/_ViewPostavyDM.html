    .Postava::after {
        content: "";
        display: block;
        clear: both;

    .character-portrait {
        width: 33%;
        float: left;
        display: block;
        position: relative;
        isolation: isolate;
        overflow: hidden;
        margin-right: 10px;
        border-radius: 8px;
        background: #1b120c;
        box-shadow: 8px 8px 15px rgba(0, 0, 0, 0.5);
    }

    .character-portrait img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: inherit;
        transition: filter 220ms ease, transform 220ms ease;
    }

    .portrait--living img {
        filter: none;
    }

    .portrait--departed img {
        /* The image itself is only partly aged. The strongest effect comes from the radial overlay below. */
        filter: sepia(55%) saturate(58%) grayscale(18%) contrast(1.08) brightness(0.9);
    }

    .portrait--departed::before,
    .portrait--departed::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        z-index: 1;
    }

    .portrait--departed::before {
        /* Circular edge ageing: center stays more colorful, edges become old parchment / shadow. */
        background:
            radial-gradient(circle at 50% 43%,
                rgba(255, 245, 220, 0) 0%,
                rgba(255, 245, 220, 0.03) 34%,
                rgba(132, 82, 36, 0.28) 63%,
                rgba(38, 25, 18, 0.82) 100%);
        mix-blend-mode: multiply;
    }

    .portrait--departed::after {
        /* Cold desaturation haze + subtle inner frame for a memorial / gone feeling. */
        background:
            radial-gradient(circle at 50% 45%,
                rgba(255, 255, 255, 0.06) 0%,
                rgba(255, 255, 255, 0.015) 38%,
                rgba(18, 16, 22, 0.22) 73%,
                rgba(0, 0, 0, 0.55) 100%),
            linear-gradient(135deg,
                rgba(255, 236, 190, 0.12),
                rgba(47, 30, 24, 0.28));
        box-shadow: inset 0 0 38px rgba(0, 0, 0, 0.72);
    }

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
<script>
    let allCharacters = [];
    const musicQueue = [];
    let currentMusicTrack = null;

    const searchableFields = [
        "Name", "FirstName", "FamilyName", "Race", "Focus", "Origin",
        "God", "Age", "Status", "Title", "Position", "Logo", "Quote", "Music", "Description"
    ];

    function escapeHtml(value) {
        return String(value ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    function normalizeText(value) {
        return String(value ?? "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .toLowerCase()
            .trim();
    }

    function isLivingStatus(status) {
        const normalizedStatus = normalizeText(status);
        return normalizedStatus === "zivy" || normalizedStatus === "ziva";
    }

    function hasCharacterQuote(quote) {
        const normalizedQuote = normalizeText(quote);
        return normalizedQuote !== "" && normalizedQuote !== "none";
    }

    function getCharacterMusic(character) {
        const musicColumnCandidates = ["Music", "Hudba", "Pieseň", "Piesen", "Song", "Skladba"];

        for (const columnName of musicColumnCandidates) {
            if (character[columnName] !== undefined) return character[columnName];
        }

        const normalizedCandidateNames = musicColumnCandidates.map(normalizeText);
        const matchingColumnName = Object.keys(character).find(columnName =>
            normalizedCandidateNames.includes(normalizeText(columnName))
        );

        return matchingColumnName ? character[matchingColumnName] : "";
    }

    function hasCharacterMusic(music) {
        const normalizedMusic = normalizeText(music);
        return normalizedMusic !== "" && normalizedMusic !== "none";
    }

    function buildCharacterMusicUrl(music) {
        const trimmedMusic = String(music ?? "").trim();
        const musicFileName = trimmedMusic.toLowerCase().endsWith(".mp3")
            ? trimmedMusic
            : `${trimmedMusic}.mp3`;

        return `https://cdn.jsdelivr.net/gh/Beariar/ALP@main/Postavy/Music/${encodeURIComponent(musicFileName)}`;
    }

    function getNameParts(name) {
        const parts = String(name ?? "").trim().split(/\s+/).filter(Boolean);

        return {
            firstName: parts[0] || "",
            familyName: parts.length > 1 ? parts[parts.length - 1] : ""
        };
    }

    function getFieldValue(character, fieldName) {
        const nameParts = getNameParts(character.Name);

        if (fieldName === "FirstName") return nameParts.firstName;
        if (fieldName === "FamilyName") return nameParts.familyName;
        if (fieldName === "Quote") return character["Citát"] ?? "";
        if (fieldName === "Music") return getCharacterMusic(character);

        return character[fieldName] ?? "";
    }

    function compareCharacters(a, b, fieldName, direction) {
        if (fieldName === "OriginalOrder") {
            const originalOrderResult = (a._originalIndex ?? 0) - (b._originalIndex ?? 0);
            return direction === "desc" ? -originalOrderResult : originalOrderResult;
        }

        const valueA = getFieldValue(a, fieldName);
        const valueB = getFieldValue(b, fieldName);
        const numberA = Number(String(valueA).replace(/[^0-9.-]/g, ""));
        const numberB = Number(String(valueB).replace(/[^0-9.-]/g, ""));

        let result;

        if (fieldName === "Age" && !Number.isNaN(numberA) && !Number.isNaN(numberB)) {
            result = numberA - numberB;
        } else {
            result = String(valueA).localeCompare(String(valueB), "sk", {
                sensitivity: "base",
                numeric: true
            });
        }

        return direction === "desc" ? -result : result;
    }

    function characterMatchesSearch(character, searchTerm, selectedField) {
        if (!searchTerm) return true;

        const normalizedSearchTerm = normalizeText(searchTerm);
        const fieldsToSearch = selectedField === "All" ? searchableFields : [selectedField];

        return fieldsToSearch.some(fieldName => {
            const fieldValue = getFieldValue(character, fieldName);
            return normalizeText(fieldValue).includes(normalizedSearchTerm);
        });
    }

    function createCharacterCard(character) {
        const {
            Image,
            Logo,
            Name,
            Race,
            Focus,
            Origin,
            God,
            Age,
            Status,
            Title,
            Position,
            Description
        } = character;

        const quote = character["Citát"] ?? "";
        const characterQuoteMarkup = hasCharacterQuote(quote)
            ? `<hr><p class="character-quote">“${escapeHtml(quote)}”</p>`
            : "";

        const music = getCharacterMusic(character);
        const characterMusicMarkup = hasCharacterMusic(music)
            ? `
                <button
                    class="character-music-button"
                    type="button"
                    data-character-music-button
                    data-music-character="${escapeHtml(Name)}"
                    data-music-title="${escapeHtml(music)}"
                    data-music-url="${escapeHtml(buildCharacterMusicUrl(music))}"
                    aria-label="Prehrať hudbu postavy ${escapeHtml(Name)}"
                    title="Prehrať hudbu postavy">
                    ♪
                </button>
              `
            : "";

        const livingCharacter = isLivingStatus(Status);
        const portraitStateClass = livingCharacter ? "portrait--living" : "portrait--departed";
        const portraitTitle = livingCharacter
            ? escapeHtml(Name)
            : `${escapeHtml(Name)} - táto postava už nežije`;

        const characterDiv = document.createElement('div');
        characterDiv.className = 'Postava';

        characterDiv.innerHTML = `
            <span class="character-portrait ${portraitStateClass}" title="${portraitTitle}">
                <img src="https://cdn.jsdelivr.net/gh/Beariar/ALP@main/Postavy/JPEG_2026/${escapeHtml(Image)}.jpg" alt="${escapeHtml(Name)}">
            </span>
            <img src="https://cdn.jsdelivr.net/gh/Beariar/ALP@main/FactionLogo/${escapeHtml(Logo)}.png" alt="${escapeHtml(Logo)}" style="width: 5%; position: absolute; top: 2%; left: 1%; z-index: 2;">
            ${characterMusicMarkup}
            <h2>${escapeHtml(Name)}</h2>
            ${characterQuoteMarkup}
            <hr>
            <b>Rasa:</b> ${escapeHtml(Race)}
            <br><b>Zameranie:</b> ${escapeHtml(Focus)}
            <br><b>Pôvod:</b> ${escapeHtml(Origin)}
            <br><b>Boh:</b> ${escapeHtml(God)}
            <br><b>Vek:</b> ${escapeHtml(Age)}
            <br><b>Stav:</b> ${escapeHtml(Status)}
            <br><b>Titul:</b> ${escapeHtml(Title)}
            <br><b>Pozícia:</b> ${escapeHtml(Position)}
            <br><b>Okupácia:</b> ${escapeHtml(Logo)}
            <hr>
            ${Description ?? ""}
        `;

        return characterDiv;
    }

    function getMusicPlayerElements() {
        return {
            player: document.getElementById("musicPlayer"),
            audio: document.getElementById("sharedCharacterAudio"),
            title: document.getElementById("musicPlayerTitle"),
            subtitle: document.getElementById("musicPlayerSubtitle"),
            queueStatus: document.getElementById("musicQueueStatus"),
            stopButton: document.getElementById("musicStopButton"),
            skipButton: document.getElementById("musicSkipButton")
        };
    }

    function updateMusicPlayerUi() {
        const { player, title, subtitle, queueStatus, skipButton } = getMusicPlayerElements();
        const hasCurrentTrack = Boolean(currentMusicTrack);

        player.hidden = !hasCurrentTrack;

        if (!hasCurrentTrack) {
            title.textContent = "Hudba postavy";
            subtitle.textContent = "";
            queueStatus.textContent = "";
            skipButton.hidden = true;
            return;
        }

        title.textContent = currentMusicTrack.characterName;
        subtitle.textContent = currentMusicTrack.songName;
        skipButton.hidden = musicQueue.length === 0;
        queueStatus.textContent = musicQueue.length > 0
            ? `V poradí: ${musicQueue.length}`
            : "";
    }

    function playMusicTrack(track) {
        const { audio } = getMusicPlayerElements();

        currentMusicTrack = track;
        audio.src = track.url;
        audio.load();
        updateMusicPlayerUi();

        const playPromise = audio.play();
        if (playPromise !== undefined) {
            playPromise.catch(() => {
                // Some browsers may still require direct user interaction with the audio control.
                updateMusicPlayerUi();
            });
        }
    }

    function enqueueCharacterMusic(track) {
        const { audio } = getMusicPlayerElements();

        if (!currentMusicTrack) {
            playMusicTrack(track);
            return;
        }

        if (currentMusicTrack.url === track.url) {
            if (audio.paused) {
                audio.play().catch(() => updateMusicPlayerUi());
            }
            updateMusicPlayerUi();
            return;
        }

        musicQueue.push(track);
        updateMusicPlayerUi();
    }

    function playNextQueuedMusic() {
        if (musicQueue.length > 0) {
            playMusicTrack(musicQueue.shift());
            return;
        }

        stopMusicPlayer();
    }

    function stopMusicPlayer() {
        const { audio } = getMusicPlayerElements();

        audio.pause();
        audio.removeAttribute("src");
        audio.load();
        currentMusicTrack = null;
        musicQueue.length = 0;
        updateMusicPlayerUi();
    }

    function setupSharedMusicPlayer() {
        const { audio, stopButton, skipButton } = getMusicPlayerElements();

        document.body.addEventListener("click", event => {
            const musicButton = event.target.closest("[data-character-music-button]");
            if (!musicButton) return;

            enqueueCharacterMusic({
                characterName: musicButton.dataset.musicCharacter || "Neznáma postava",
                songName: musicButton.dataset.musicTitle || "Hudba postavy",
                url: musicButton.dataset.musicUrl || ""
            });
        });

        stopButton.addEventListener("click", stopMusicPlayer);
        skipButton.addEventListener("click", playNextQueuedMusic);
        audio.addEventListener("ended", playNextQueuedMusic);
    }

    function renderCharacters() {
        const searchTerm = document.getElementById("searchInput").value;
        const searchField = document.getElementById("searchField").value;
        const sortField = document.getElementById("sortField").value;
        const sortDirection = document.getElementById("sortDirectionButton").dataset.direction;

        document.querySelectorAll('.Postava').forEach(card => card.remove());

        const visibleCharacters = allCharacters
            .filter(character => characterMatchesSearch(character, searchTerm, searchField))
            .sort((a, b) => compareCharacters(a, b, sortField, sortDirection));

        visibleCharacters.forEach(character => {
            document.body.appendChild(createCharacterCard(character));
        });

        document.getElementById("resultCount").textContent = `Zobrazené: ${visibleCharacters.length} / ${allCharacters.length}`;
        applyOrientationStyles();
    }

    async function loadCharacters() {
        const response = await fetch('https://raw.githubusercontent.com/Beariar/ALP/main/Postavy/_PostavyFormatDM.csv');
        const data = await response.text();

        // Pre-process the data to remove lines that start with '#'
        const filteredData = data.split('\n').filter(line => !line.trim().startsWith('#')).join('\n');

        Papa.parse(filteredData, {
            delimiter: "|",  // Specify the custom delimiter
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                // Keep the original CSV order so Reset can restore it later.
                allCharacters = results.data.map((character, index) => ({
                    ...character,
                    _originalIndex: index
                }));
                renderCharacters();
            }
        });
    }

    function setupControls() {
        document.getElementById("searchInput").addEventListener("input", renderCharacters);
        document.getElementById("searchField").addEventListener("change", renderCharacters);
        document.getElementById("sortField").addEventListener("change", renderCharacters);

        document.getElementById("sortDirectionButton").addEventListener("click", event => {
            const button = event.currentTarget;
            const currentDirection = button.dataset.direction;
            const nextDirection = currentDirection === "asc" ? "desc" : "asc";

            button.dataset.direction = nextDirection;
            button.textContent = nextDirection === "asc" ? "A → Z" : "Z → A";
            renderCharacters();
        });

        document.getElementById("resetFiltersButton").addEventListener("click", () => {
            document.getElementById("searchInput").value = "";
            document.getElementById("searchField").value = "All";
            document.getElementById("sortField").value = "OriginalOrder";
            document.getElementById("sortDirectionButton").dataset.direction = "asc";
            document.getElementById("sortDirectionButton").textContent = "A → Z";
            renderCharacters();
        });
    }

    function applyOrientationStyles() {
        const orientation = window.innerWidth > window.innerHeight ? 'landscape' : 'portrait';
        const contentDivs = document.querySelectorAll('.Postava, .HlavnyNadpis, .Controls');

        contentDivs.forEach(contentDiv => {
            // Remove any existing orientation-related classes
            contentDiv.classList.remove('wide-mode', 'narrow-mode');

            // Add appropriate class based on current orientation
            if (orientation === 'landscape') {
                contentDiv.classList.add('wide-mode');
            } else {
                contentDiv.classList.add('narrow-mode');
            }
        });

        console.log(`Orientation: ${orientation}, Width: ${window.innerWidth}, Height: ${window.innerHeight}`);
    }

    setupControls();
    setupSharedMusicPlayer();
    loadCharacters();

    // Add event listener for window resize to detect orientation change
    window.addEventListener('resize', applyOrientationStyles);
</script>
